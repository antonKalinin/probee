name: Release MacOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release should have a tag (v0.0.0)
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build MacOS
    runs-on: macos-latest
    env:
      CARGO_PROFILE_RELEASE_LTO: true
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rustup
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build aarch64
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STORAGE_SALT: ${{ secrets.STORAGE_SALT }}
          SUPABASE_PUBLIC_URL: ${{ vars.SUPABASE_PUBLIC_URL }}
          SUPABASE_PUBLIC_ANON_KEY: ${{ vars.SUPABASE_PUBLIC_ANON_KEY }}
        run: cargo build --target=aarch64-apple-darwin --release

      - name: Install Packager
        run: cargo install cargo-packager --locked

      - name: Package
        run: cargo packager --release

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            target/aarch64-apple-darwin/release/*.dmg
